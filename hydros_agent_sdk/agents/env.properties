# Shared Hydros Agent SDK Environment Configuration
# This file is the default env.properties loaded by load_env_config()
# and load_runtime_env_settings() when no absolute env file is provided.

# MQTT Broker URL (tcp:// or ssl://)
mqtt_broker_url=tcp://prod.hydros.yuma.intra
# mqtt_broker_url=tcp://127.0.0.1
# mqtt_broker_url=tcp://10bt45ib24737.vicp.fun

# MQTT Broker Port
# mqtt_broker_port=11882
mqtt_broker_port=1883

# Field metrics topic template
metrics_topic=/hydros/data/edges/{hydros_cluster_id}

# MPC planning service base URL. The SDK calls:
# {mpc_service_base_url}/hydros/api/v1/mpc/planning/start
mpc_service_base_url=http://192.168.20.52:2375

# MQTT Authentication (optional, leave commented out for internal network without auth)
mqtt_username=hydros_agent_user
mqtt_password=HbGcDx125a

# Hydros Cluster and Node Configuration
# MQTT topic will be auto-generated as:
# /hydros/commands/coordination/{hydros_cluster_id}
hydros_cluster_id=hydros-engine-public
hydros_node_id=default_central
