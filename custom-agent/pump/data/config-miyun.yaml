topology:
  boundary_series_source: create
  boundary_nodes:
  - id: upstream
    hydro_node: NODE-屯佃-1
    series_column: NODE-屯佃-1
    mpc_key: b0
  - id: downstream
    hydro_node: NODE-西台上-2
    series_column: NODE-西台上-2
    mpc_key: b6
  channel_segments:
  - id: seg_1
    upstream_station_id: 1
    downstream_station_id: 2
    hydro_channel: CH2-屯佃-温泉
    hydro_profile_node: CH2-屯佃-温泉
    disturbance_node: 屯佃-温泉-扰动
  - id: seg_2
    upstream_station_id: 1
    downstream_station_id: 2
    hydro_channel: CH3-温泉-前柳林
    hydro_profile_node: CH3-温泉-前柳林
    disturbance_node: 温泉-前柳林-扰动
  - id: seg_3
    upstream_station_id: 2
    downstream_station_id: 3
    hydro_channel: CH4-前柳林
    hydro_profile_node: CH4-前柳林
    disturbance_node: 前柳林-扰动
  - id: seg_4
    upstream_station_id: 2
    downstream_station_id: 3
    hydro_channel: CH5-前柳林-土城
    hydro_profile_node: CH5-前柳林-土城
    disturbance_node: 前柳林-土城-扰动
  - id: seg_5
    upstream_station_id: 2
    downstream_station_id: 3
    hydro_channel: CH6-土城-横桥
    hydro_profile_node: CH6-土城-横桥
    disturbance_node: 土城-横桥-扰动
  - id: seg_6
    upstream_station_id: 2
    downstream_station_id: 3
    hydro_channel: CH7-横桥-埝头
    hydro_profile_node: CH7-横桥-埝头
    disturbance_node: 横桥-埝头-扰动
  - id: seg_7
    upstream_station_id: 3
    downstream_station_id: 4
    hydro_channel: CH8-埝头
    hydro_profile_node: CH8-埝头
    disturbance_node: 埝头-扰动
  - id: seg_8
    upstream_station_id: 3
    downstream_station_id: 4
    hydro_channel: CH9-埝头-东沙河
    hydro_profile_node: CH9-埝头-东沙河
    disturbance_node: 埝头-东沙河-扰动
  - id: seg_9
    upstream_station_id: 3
    downstream_station_id: 4
    hydro_channel: CH10-东沙河-兴寿
    hydro_profile_node: CH10-东沙河-兴寿
    disturbance_node: 东沙河-兴寿-扰动
  - id: seg_10
    upstream_station_id: 4
    downstream_station_id: 5
    hydro_channel: CH11-兴寿
    hydro_profile_node: CH11-兴寿
    disturbance_node: 兴寿-扰动
  - id: seg_11
    upstream_station_id: 4
    downstream_station_id: 5
    hydro_channel: CH12-兴寿-桃峪口
    hydro_profile_node: CH12-兴寿-桃峪口
    disturbance_node: 兴寿-桃峪口-扰动
  - id: seg_12
    upstream_station_id: 4
    downstream_station_id: 5
    hydro_channel: CH13-桃峪口-李史山
    hydro_profile_node: CH13-桃峪口-李史山
