global_params:
  rho: 1000
  g: 9.81
flow_depart:
  step_q: 1
  step_h: 0.1
  data_dir: data-miyu
  output_dir: output/miyu
scheduling:
  horizon_hours: 48
  dt_hours: 1
  target_avg_flow_last_station: 10
runtime:
  odd:
    odd1_flow_tolerance: 2.0
    odd1_level_tolerance: 0.15
    odd3_flow_tolerance: 8.0
    odd3_level_tolerance: 0.8
    odd2_fit_threshold: 0.62
  search:
    head_search_tolerance: 1.35
    flow_search_tolerance: 8.0
    candidate_pool_limit: 60
  upper_scheduler:
    upper_mpc_optimization_method: nlp
    upper_level_correction_gain: 0.25
    upper_flow_bias_correction_gain: 0.3
  lower_controller:
    control_horizon_lower: 10
    opening_change_threshold: 0.0
    station_memory_init_age: 999
    lower_flow_weight: 3.0
    lower_level_weight: 2.5
    lower_switch_weight: 3.0
    lower_adjust_count_weight: 0.8
  environment:
    hidden_disturbance_enabled: false
    hidden_disturbance_active_scenario: moderate
    hidden_disturbance_rain_light_path: ../data/hidden-disturbance-rain-light.xlsx
    hidden_disturbance_rain_moderate_path: ../data/hidden-disturbance-rain-moderate.xlsx
    hidden_disturbance_rain_heavy_path: ../data/hidden-disturbance-rain-heavy.xlsx
    env_substeps: 6
    basin_clip_margin_b1: 1.0
    basin_clip_margin_b2: 1.5
    sim_api_base_url: http://172.20.90.78:8100/
    sim_create_is_steady_state: true
    sim_sync_dt_seconds: 100
    auto_identify_pool_areas: true
  unit_availability:
    unit_availability_enabled: false
    unit_availability_active_scenario: baseline
    unit_availability_scenarios:
      baseline:
        '1': []
        '2': []
        '3': []
        '4': []
        '5': []
        '6': []
  observer:
    observer_gain: 0.35
    observer_smoothing: 0.0
    disturbance_forecast_window_hours: 4.0
    disturbance_forecast_method: hold
  output:
    console_verbose: true
    console_float_precision: 3
    output_dir: output/miyu
    save_step_plots: true
