topology:
  boundary_series_source: file
  boundary_nodes:
  - id: upstream
    hydro_node: 0-洪泽湖
    series_column: 洪泽湖
    mpc_key: b0
  - id: downstream
    hydro_node: 5-骆马湖
    series_column: 骆马湖
    mpc_key: b3
  channel_segments:
  - id: pool_1
    upstream_station_id: 1
    downstream_station_id: 2
    hydro_channel: 泗洪站 -> 睢宁二站
    hydro_profile_node: 0-泗洪-睢宁段
    disturbance_node: 沙集站分水
  - id: pool_2
    upstream_station_id: 2
    downstream_station_id: 3
    hydro_channel: 睢宁二站 -> 邳州站
    hydro_profile_node: 1-睢宁-邳州段
    disturbance_node: 沙集站入水
  channel_groups:
  - upstream_station_id: 1
    downstream_station_id: 2
    segment_ids:
    - pool_1
  - upstream_station_id: 2
    downstream_station_id: 3
    segment_ids:
    - pool_2
global_params:
  rho: 1000
  g: 9.81
flow_depart:
  step_q: 4.0
  step_h: 0.5
  data_dir: data
  output_dir: output
scheduling:
  horizon_hours: 72
  dt_hours: 1
  target_avg_flow_last_station: 50
runtime:
  odd:
    odd1_flow_tolerance: 0
    odd1_level_tolerance: 0
    odd3_flow_tolerance: 0
    odd3_level_tolerance: 0
    odd2_fit_threshold: 0.9
  search:
    head_search_tolerance: 0.35
    flow_search_tolerance: 8.0
    candidate_pool_limit: 60
  upper_scheduler:
    upper_level_correction_gain: 0.0
    upper_flow_bias_correction_gain: 1.0
    upper_mpc_optimization_method: greedy
  lower_controller:
    control_horizon_lower: 10
    opening_change_threshold: 0.0
    station_memory_init_age: 999
    lower_flow_weight: 3.0
    lower_level_weight: 2.5
    lower_switch_weight: 0.0
    lower_adjust_count_weight: 0
  environment:
    hidden_disturbance_enabled: true
    hidden_disturbance_active_scenario: moderate
    hidden_disturbance_rain_light_path: hidden-disturbance-rain-light.xlsx
    hidden_disturbance_rain_moderate_path: hidden-disturbance-rain-moderate.xlsx
    hidden_disturbance_rain_heavy_path: hidden-disturbance-rain-heavy.xlsx
    env_substeps: 6
    basin_clip_margin_b1: 1.0
    basin_clip_margin_b2: 1.5
    sim_api_base_url: http://172.20.90.78:8100/
    sim_create_is_steady_state: true
    sim_sync_dt_seconds: 10
    auto_identify_pool_areas: true
  unit_availability:
    unit_availability_enabled: false
    unit_availability_active_scenario: maintenance_fault
    unit_availability_scenarios:
      baseline:
        '1': []
        '2': []
        '3': []
      maintenance_fault: {}
  observer:
    observer_gain: 0.5
    observer_smoothing: 0.0
    disturbance_forecast_window_hours: 4.0
    disturbance_forecast_method: hold
  output:
    console_verbose: true
    console_float_precision: 3
    output_dir: output/xhh
    save_step_plots: true
