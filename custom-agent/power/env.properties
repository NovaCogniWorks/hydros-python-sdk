# Shared MQTT Broker Configuration
# This file contains the MQTT broker connection settings shared by all agents

# MQTT Broker URL (tcp:// or ssl://)
# production: mqtt_broker_url=tcp://mqtt.production.hydros.yuma.intra
# staging:    mqtt_broker_url=tcp://mqtt.staging.hydros.yuma.intra
# testing:    mqtt_broker_url=tcp://mqtt.testing.hydros.yuma.intra
mqtt_broker_url=tcp://192.168.50.112

# MQTT Broker Port
#mqtt_broker_port=11882
mqtt_broker_port=1883
metrics_topic=/hydros/data/edges/{hydros_cluster_id}

# MQTT Authentication (optional, leave commented out for internal network without auth)
mqtt_username=hydros_agent_user
mqtt_password=HbGcDx125a
 
# Hydros Cluster and Node Configuration
# 集群ID - 这是唯一需要修改的配置项
# MQTT topic 会自动使用这个值: /hydros/commands/coordination/{hydros_cluster_id}
# production: hydros_cluster_id=hydros-cluster-production
# staging:    hydros_cluster_id=hydros-cluster-staging
# testing:    hydros_cluster_id=hydros-cluster-testing
hydros_cluster_id=hydros-cluster-staging

# 节点ID - 标识当前运行节点
hydros_node_id=default_central
